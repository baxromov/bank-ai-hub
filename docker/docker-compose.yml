version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ibhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ibhub
      POSTGRES_USER: ibhub
      POSTGRES_PASSWORD: ibhub_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ibhub-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: ../../docker/api/Dockerfile
    container_name: ibhub-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://ibhub:ibhub_secret@postgres:5432/ibhub
      DATABASE_URL_SYNC: postgresql://ibhub:ibhub_secret@postgres:5432/ibhub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app

  celery-worker:
    build:
      context: ../apps/api
      dockerfile: ../../docker/api/Dockerfile
    container_name: ibhub-celery
    command: celery -A src.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://ibhub:ibhub_secret@postgres:5432/ibhub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    container_name: ibhub-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: ""
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../apps/web/public:/app/apps/web/public
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: ibhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
